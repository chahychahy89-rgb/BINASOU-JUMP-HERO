<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BINASOU JUMP HERO</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --silver: #C0C0C0;
            --premium-bg: #000000;
            --btn-grad: linear-gradient(45deg, #d4af37, #f9e297, #C0C0C0);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--premium-bg); 
            color: var(--gold); font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow: hidden; touch-action: none;
        }

        /* شاشة البداية */
        #start-screen {
            position: absolute; width: 100%; height: 100%; 
            background: rgba(0,0,0,1);
            z-index: 200; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center;
        }

        .welcome-title { 
            font-size: clamp(24px, 8vw, 40px); 
            margin-bottom: 20px; 
            text-shadow: 0 0 15px var(--gold); 
            font-weight: bold;
        }

        .gender-select { margin-bottom: 30px; }
        .gender-btn { 
            background: none; border: 2px solid var(--silver); color: #fff; 
            padding: 12px 25px; margin: 5px; border-radius: 15px; cursor: pointer;
            font-size: 16px; transition: 0.3s;
        }
        .gender-btn.active { background: var(--gold); color: black; border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
